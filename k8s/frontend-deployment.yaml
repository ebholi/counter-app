apiVersion: apps/v1
kind: Deployment
metadata:
  name: counter-frontend
  labels:
    app: counter-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: counter-frontend
  template:
    metadata:
      labels:
        app: counter-frontend
    spec:
      containers:
        - name: counter-frontend
          image: ghcr.io/ebholi/counter-frontend:v1
          env:
            - name: NAMESPACE
              value: "264574-ebholi"
            - name: BACKEND_URL
              value: "https://counter-backend-$(NAMESPACE).apps.exoscale-ch-gva-2-0.appuio.cloud"
            - name: npm_config_cache
              value: ./.npm-cache